    namespace: data-access-errors-rest
    port: 8080
    description: REST adapter for Bugsnag Data Access API — Errors. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/projects/{project-id}/errors
      name: projects-project-id-errors
      description: REST surface for projects-project_id-errors.
      operations:
      - method: GET
        name: listprojecterrors
        description: List project errors
        call: data-access-errors.listprojecterrors
