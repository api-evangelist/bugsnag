    resources:
    - name: projects-project_id-errors
      path: /projects/{project_id}/errors
      operations:
      - name: listprojecterrors
        method: GET
        description: List project errors
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sort
          in: query
          type: string
          description: The field to sort results by. Supported values include last_seen, first_seen, users, events, and unsorted.
        - name: direction
          in: query
          type: string
          description: The sort direction, either ascending or descending.
        - name: status
          in: query
          type: string
          description: Filter errors by their status.
        - name: severity
          in: query
          type: string
          description: Filter errors by their severity level.
        - name: release_stage
          in: query
          type: string
          description: Filter errors by the release stage in which they occurred.
        - name: q
          in: query
          type: string
          description: A full-text search query to filter errors by their error class, message, or context.
    - name: projects-project_id-errors-error_id
      path: /projects/{project_id}/errors/{error_id}
      operations:
      - name: geterror
        method: GET
        description: Get an error
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updateerror
        method: PATCH
        description: Update an error
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteerror
        method: DELETE
        description: Delete an error
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.BUGSNAG_API_KEY}}'
      placement: header
