naftiko: 1.0.0-alpha2
info:
  label: Bugsnag Data Access API — Errors
  description: 'Bugsnag Data Access API — Errors. 4 operations. Lead operation: List project errors. Self-contained Naftiko
    capability covering one Bugsnag business surface.'
  tags:
  - Bugsnag
  - Errors
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
