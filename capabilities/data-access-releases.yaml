naftiko: 1.0.0-alpha2
info:
  label: Bugsnag Data Access API — Releases
  description: 'Bugsnag Data Access API — Releases. 2 operations. Lead operation: List project releases. Self-contained Naftiko
    capability covering one Bugsnag business surface.'
  tags:
  - Bugsnag
  - Releases
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BUGSNAG_API_KEY: BUGSNAG_API_KEY
capability:
  consumes:
  - type: http
    namespace: data-access-releases
    baseUri: https://api.bugsnag.com
    description: Bugsnag Data Access API — Releases business capability. Self-contained, no shared references.
    resources:
    - name: projects-project_id-releases
      path: /projects/{project_id}/releases
      operations:
      - name: listprojectreleases
        method: GET
        description: List project releases
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: release_stage
          in: query
          type: string
          description: Filter releases by a specific release stage.
    - name: projects-project_id-releases-release_id
      path: /projects/{project_id}/releases/{release_id}
      operations:
      - name: getrelease
        method: GET
        description: Get a release
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.BUGSNAG_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: data-access-releases-rest
    port: 8080
    description: REST adapter for Bugsnag Data Access API — Releases. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/projects/{project-id}/releases
      name: projects-project-id-releases
      description: REST surface for projects-project_id-releases.
      operations:
      - method: GET
        name: listprojectreleases
        description: List project releases
        call: data-access-releases.listprojectreleases
        with:
          release_stage: rest.release_stage
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/projects/{project-id}/releases/{release-id}
      name: projects-project-id-releases-release-id
      description: REST surface for projects-project_id-releases-release_id.
      operations:
      - method: GET
        name: getrelease
        description: Get a release
        call: data-access-releases.getrelease
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: data-access-releases-mcp
    port: 9090
    transport: http
    description: MCP adapter for Bugsnag Data Access API — Releases. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: list-project-releases
      description: List project releases
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: data-access-releases.listprojectreleases
      with:
        release_stage: tools.release_stage
      outputParameters:
      - type: object
        mapping: $.
    - name: get-release
      description: Get a release
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: data-access-releases.getrelease
      outputParameters:
      - type: object
        mapping: $.
