specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Bugsnag
providerId: bugsnag
created: '2026-05-04'
modified: '2026-05-04'
reconciled: true
tags:
  - Rate Limiting
  - Error Monitoring
description: Bugsnag Data API rate limits per token.
sources:
  - https://bugsnag.com/pricing/
  - https://bugsnagapiv2.docs.apiary.io/
headers:
  retryAfter: Retry-After
responseCodes:
  throttled: 429
limits:
  - name: Data API (default)
    scope: token
    metric: requests_per_minute
    limit: 60
    timeFrame: minute
  - name: Notify API (event ingest)
    scope: project
    metric: events_per_minute
    limit: tier-based
  - name: Build API
    scope: project
    metric: builds_per_minute
    limit: 60
    timeFrame: minute
